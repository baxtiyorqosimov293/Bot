services:
  - type: worker
    name: azibax-ai-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    autoDeploy: true
    disk:
      name: azibax-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_USER_ID
        sync: false
      - key: FREE_TRIALS
        value: "2"
      - key: PRICE_SINGLE_XTR
        value: "39"
      - key: PRICE_MONTH_XTR
        value: "249"
      - key: MONTH_LIMIT
        value: "30"
      - key: REFERRAL_BONUS_CREDITS
        value: "1"
      - key: DB_PATH
        value: /var/data/bot.db
      - key: OPENAI_IMAGE_MODEL
        value: gpt-image-1
      - key: OPENAI_SIZE
        value: 768x768
      - key: LOG_LEVEL
        value: INFO
